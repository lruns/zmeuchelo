  function resize() {
    DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    W = Math.floor(window.innerWidth);
    H = Math.floor(window.innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    BASE = Math.min(W, H);
    S = BASE / 900;
    // На узких экранах (телефон) увеличиваем масштаб мира: змейка, мужики, ёлка,
    // яблоки, таблички, пузыри и шрифты — крупнее и читаемее пальцем. Поле
    // логически становится теснее (меньше влезает) — так задумано.
    var WZ = (W < 500) ? 1.8 : (W < 720 ? 1.3 : 1);
    S *= WZ;
    layout();
  }

  // ---------------------------------------------------------------------------
  //  Рисовалки-примитивы в стиле MS Paint: тонкая чёрная обводка, без сглаживания
  //  красоты. Фигуры рисуются отдельно и налезают — линии пересечений видны.
  // ---------------------------------------------------------------------------
  function ink() {
    ctx.lineWidth = Math.max(1, 1.1 * S);
    ctx.strokeStyle = "#000";
    ctx.lineJoin = "miter";
  }
  function ell(x, y, rx, ry, fill) {
    ctx.beginPath();
    ctx.ellipse(x, y, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    ink(); ctx.stroke();
  }
  function rect(x, y, w, h, fill) {
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    ink(); ctx.stroke();
  }
  function tri(ax, ay, bx, by, cx, cy, fill) {
    ctx.beginPath();
    ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(cx, cy); ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    ink(); ctx.stroke();
  }
  function stroke(ax, ay, bx, by) {
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
    ink(); ctx.stroke();
  }

  // Лицо: два белых овала-глаза (зрачков НЕТ) + красный овал-рот.
  function face(headR, ex, mouthAtFront) {
    // ex — множитель размера. Ориентировано по +X (вперёд).
    var eyeX = headR * 0.30, eyeY = headR * 0.42;
    ell(eyeX, -eyeY, headR * 0.34 * ex, headR * 0.44 * ex, "#fff");
    ell(eyeX,  eyeY, headR * 0.34 * ex, headR * 0.44 * ex, "#fff");
    var mx = mouthAtFront ? headR * 0.55 : 0;
    ell(mx, headR * 0.05, headR * 0.30 * ex, headR * 0.18 * ex, "#E33");
  }

  // ---------------------------------------------------------------------------
  //  Звук — только WebAudio-бипы, никаких файлов. Есть выключалка.
  // ---------------------------------------------------------------------------
  var AC = null, soundOn = true;
  function audio() {
    if (!AC) {
      try { AC = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { AC = null; }
    }
    if (AC && AC.state === "suspended") AC.resume();
    return AC;
  }
  function beep(freq, dur, type, vol, slideTo) {
    if (!soundOn) return;
    var a = audio(); if (!a) return;
    var o = a.createOscillator(), g = a.createGain();
    o.type = type || "square";
    o.frequency.setValueAtTime(freq, a.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime + dur);
    g.gain.setValueAtTime(0.0001, a.currentTime);
    g.gain.exponentialRampToValueAtTime(vol || 0.15, a.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur + 0.02);
  }
  var sfx = {
    eat:  function () { beep(520, 0.09, "square", 0.14, 880); },
    die:  function () { beep(300, 0.5, "sawtooth", 0.18, 70); },
    bul:  function () { beep(180, 0.35, "sine", 0.2, 60); beep(120, 0.4, "sine", 0.15, 50); },
    click:function () { beep(660, 0.05, "square", 0.12); }
  };

  // ---------------------------------------------------------------------------
  //  Настройки (localStorage, с try/catch на случай запрета)
  // ---------------------------------------------------------------------------
  var musicOn = true;
  function loadPrefs() {
    try {
      var s = localStorage.getItem("zmeu_sound"); if (s !== null) soundOn = (s === "1");
      var m = localStorage.getItem("zmeu_music"); if (m !== null) musicOn = (m === "1");
    } catch (e) {}
  }
  function savePrefs() {
    try {
      localStorage.setItem("zmeu_sound", soundOn ? "1" : "0");
      localStorage.setItem("zmeu_music", musicOn ? "1" : "0");
    } catch (e) {}
  }

  // ---------------------------------------------------------------------------
  //  Ретро-музыка — весь мотив кодом (WebAudio). Негромкая, мажорная пентатоника
  //  (C-D-E-G-A) в средних октавах — консонанс без визга. Луп 16 шагов.
  // ---------------------------------------------------------------------------
  var MEL = [392.00, 440.00, 0, 523.25, 440.00, 0, 392.00, 329.63,
             293.66, 329.63, 0, 392.00, 440.00, 0, 329.63, 0];
  var BASS = [130.81, 98.00];      // C3 и G2 — мягкий бас по тактам
  var STEP = 0.2;                  // длительность шага (спокойный темп)
  var musicTimer = null, musicStep = 0, musicNextTime = 0;
  function toneAt(freq, t, dur, type, vol) {
    var a = AC; if (!a) return;
    var o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t + dur + 0.03);
  }
  function musicTick() {
    if (!AC || !musicOn || !musicTimer) return;
    var now = AC.currentTime;
    while (musicNextTime < now + 0.18) {
      var i = musicStep;
      var swing = (i % 2 === 1) ? 0.018 : 0;   // лёгкий свинг
      var f = MEL[i];
      if (f) toneAt(f, musicNextTime + swing, 0.17, "square", 0.045);   // тише бипов
      if (i % 8 === 0) toneAt(BASS[i / 8], musicNextTime, 0.55, "triangle", 0.05);
      musicNextTime += STEP;
      musicStep = (i + 1) % 16;
    }
  }
  function startMusic() {
    if (!musicOn) return;
    var a = audio(); if (!a) return;
    if (musicTimer) return;
    musicStep = 0; musicNextTime = a.currentTime + 0.12;
    musicTimer = setInterval(musicTick, 60);
  }
  function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }

  // ---------------------------------------------------------------------------
  //  Хаптик (Telegram) с безопасным no-op fallback
  // ---------------------------------------------------------------------------
  var Tg = null;
  function haptic(kind) {
    try {
      if (Tg && Tg.HapticFeedback) {
        if (kind === "eat") Tg.HapticFeedback.impactOccurred("light");
        else if (kind === "die") Tg.HapticFeedback.notificationOccurred("error");
      }
    } catch (e) {}
  }

  // ---------------------------------------------------------------------------
  //  Мир: препятствия (ёлка, пруд), NPC, еда
  // ---------------------------------------------------------------------------
  var tree = {}, pond = {}, fence = {};
  function layout() {
    tree.x = W * 0.22;
    tree.baseY = H * 0.40;
    tree.w = 150 * S;          // ширина нижнего треугольника
    tree.h = 210 * S;          // высота кроны
    tree.trunkW = 28 * S;
    tree.trunkH = 46 * S;
    // круг столкновения ёлки (прощающий: чуть меньше визуала)
    tree.cx = tree.x;
    tree.cy = tree.baseY - tree.h * 0.35;
    tree.r = tree.w * 0.42;

    pond.cx = W * 0.72;
    pond.cy = H * 1.0;         // центр на самом низу — видна верхняя половина
    pond.rx = Math.max(160 * S, W * 0.26);
    pond.ry = 150 * S;

    // Заборчик у ВЕРХНЕГО края — только над x-диапазоном пруда. Без него телепорт
    // через верх выкидывал змейку снизу прямо в пруд (несправедливая смерть).
    // Пруд примыкает к нижнему краю и сам смертелен, поэтому снизу ловушки нет —
    // забор нужен только сверху.
    fence.x0 = Math.max(0, pond.cx - pond.rx);
    fence.x1 = Math.min(W, pond.cx + pond.rx);
    fence.h = 30 * S;          // высота штакетин
  }

  var snake = null;
  function newSnake() {
    var s = {
      x: W * 0.5, y: H * 0.55,
      heading: 0, target: 0,
      trail: [],
      seg: 4,                 // стартовая длина тела (эллипсов)
      score: 0,
      invul: 1.2,             // краткая неуязвимость на старте
      alive: true,
      fixT: 0,                // косметика «ПОФИКШЕНО» (сек)
      fixSeg: 0               // индекс сегмента, покрашенного не тем цветом
    };
    for (var i = 0; i < 60; i++) s.trail.push({ x: s.x - i, y: s.y });
    return s;

  function headR() { return 24 * S; }

  var TURN = 4.6; // рад/с

  var foods = [];
  function spawnFood() {
    var r = 13 * S;
    for (var tries = 0; tries < 200; tries++) {
      var x = r + 40 * S + Math.random() * (W - 2 * (r + 40 * S));
      var y = r + 40 * S + Math.random() * (H - 2 * (r + 40 * S));
      if (dist(x, y, tree.cx, tree.cy) < tree.r + 60 * S) continue;
      if (inEllipse(x, y, pond.cx, pond.cy, pond.rx + 50 * S, pond.ry + 50 * S)) continue;
      if (dist(x, y, snake.x, snake.y) < 160 * S) continue;
      var ok = true;
      for (var f = 0; f < foods.length; f++) if (dist(x, y, foods[f].x, foods[f].y) < 90 * S) ok = false;
      if (!ok) continue;
      foods.push({ x: x, y: y, r: r, wob: Math.random() * 6.28 });
      return;
    }
    foods.push({ x: W * 0.5, y: H * 0.3, r: r, wob: 0 });
  }

  function dist(ax, ay, bx, by) { var dx = ax - bx, dy = ay - by; return Math.sqrt(dx * dx + dy * dy); }
  function inEllipse(x, y, cx, cy, rx, ry) {
    var dx = (x - cx) / rx, dy = (y - cy) / ry; return dx * dx + dy * dy <= 1;
  }
  function angLerp(a, b, maxStep) {
    var d = b - a;
    while (d > Math.PI) d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    if (d > maxStep) d = maxStep;
    if (d < -maxStep) d = -maxStep;
    return a + d;
  }

  // Сэмплирование тела по длине дуги вдоль следа (с обработкой телепорта у краёв)
  function sampleBody(count, gap) {
    var pts = [];
    var trail = snake.trail;
    var n = trail.length;
    if (n < 2) return pts;
    var need = gap, acc = 0;
    var maxJump = 0.45 * BASE;
    for (var i = n - 1; i > 0 && pts.length < count; i--) {
      var p1 = trail[i], p0 = trail[i - 1];
      var segLen = dist(p1.x, p1.y, p0.x, p0.y);
      if (segLen > maxJump) {           // телепорт через край — обрываем сэмпл
        while (pts.length < count) pts.push({ x: p0.x, y: p0.y });
        break;
      }
      while (acc + segLen >= need && pts.length < count) {
        var t = (need - acc) / segLen;
        pts.push({ x: p1.x + (p0.x - p1.x) * t, y: p1.y + (p0.y - p1.y) * t });
        need += gap;
      }
      acc += segLen;
    }
    while (pts.length < count) pts.push({ x: trail[0].x, y: trail[0].y });
    return pts;
  }

  // ---------------------------------------------------------------------------
  //  Управление
  // ---------------------------------------------------------------------------
  var STATE = "start"; // "start" | "play" | "dead"
  var paused = false;  // пауза во время игры
  var buttons = {};    // клик-зоны текущего экрана

  function pauseGame() { if (STATE === "play" && !paused) { paused = true; stopMusic(); sfx.click(); } }
  function resumeGame() { if (paused) { paused = false; if (musicOn) startMusic(); sfx.click(); } }

  function setTargetDir(dir) {
    if (STATE !== "play") return;
    if (dir === "up") snake.target = -Math.PI / 2;
    else if (dir === "down") snake.target = Math.PI / 2;
    else if (dir === "left") snake.target = Math.PI;
    else if (dir === "right") snake.target = 0;
  }

  window.addEventListener("keydown", function (e) {
    var k = e.key.toLowerCase();
    if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].indexOf(k) >= 0) e.preventDefault();
    if (k === "arrowup" || k === "w" || k === "ц") setTargetDir("up");
    else if (k === "arrowdown" || k === "s" || k === "ы") setTargetDir("down");
    else if (k === "arrowleft" || k === "a" || k === "ф") setTargetDir("left");
    else if (k === "arrowright" || k === "d" || k === "в") setTargetDir("right");
    else if (k === "escape" || k === "p" || k === "з") {
      if (overlay) { overlay = null; }
      else if (STATE === "play") { if (paused) resumeGame(); else pauseGame(); }
    }
    else if (k === " " || k === "enter") {
      if (overlay || paused) return;
      if (STATE === "start") startGame();
      else if (STATE === "dead") startGame();
    }
  }, { passive: false });

  // Указатель: тап по кнопкам, свайпы для управления
  var pDown = null;
  function pointerPos(e) {
    var r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  canvas.addEventListener("pointerdown", function (e) {
    var p = pointerPos(e);
    pDown = { x: p.x, y: p.y, t: performance.now(), moved: false };
    audio(); // разблокировать звук по первому касанию
  });
  function updateCursor(x, y) {
    var over = false;
    if (overlay === "museum") over = hit(buttons.julLink, x, y) || hit(buttons.museumClose, x, y);
    else if (paused) over = hit(buttons.pResume, x, y) || hit(buttons.pSound, x, y) || hit(buttons.pMusic, x, y) || hit(buttons.pRestart, x, y);
    else if (STATE === "start") over = hit(buttons.play, x, y) || hit(buttons.orig, x, y) || hit(buttons.sound, x, y);
    else if (STATE === "dead") over = hit(buttons.wish, x, y) || hit(buttons.again, x, y) || hit(buttons.sound, x, y);
    else if (STATE === "play") over = hit(buttons.pause, x, y);
    canvas.style.cursor = over ? "pointer" : "default";
  }
  canvas.addEventListener("pointermove", function (e) {
    var pp = pointerPos(e);
    updateCursor(pp.x, pp.y);
    if (!pDown) return;
    var p = pp;
    var dx = p.x - pDown.x, dy = p.y - pDown.y;
    if (Math.abs(dx) + Math.abs(dy) > 24 * S && STATE === "play") {
      if (Math.abs(dx) > Math.abs(dy)) setTargetDir(dx > 0 ? "right" : "left");
      else setTargetDir(dy > 0 ? "down" : "up");
      pDown.x = p.x; pDown.y = p.y; pDown.moved = true;
    }
  });
  canvas.addEventListener("pointerup", function (e) {
    if (!pDown) return;
    var p = pointerPos(e);
    var dx = p.x - pDown.x, dy = p.y - pDown.y;
    var isTap = !pDown.moved && Math.abs(dx) + Math.abs(dy) < 16 * S;
    if (isTap) handleTap(p.x, p.y);
    pDown = null;
  });

  function hit(b, x, y) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }
  function handleTap(x, y) {
    if (overlay === "museum") {                    // оверлей перехватывает клики
      if (hit(buttons.julLink, x, y)) { sfx.click(); openTelegram(); return; }   // ссылка не закрывает оверлей
      if (hit(buttons.museumClose, x, y)) { overlay = null; sfx.click(); }
      return;
    }
    if (paused) {                                  // меню паузы перехватывает клики
      if (hit(buttons.pResume, x, y)) { resumeGame(); return; }
      if (hit(buttons.pSound, x, y)) { soundOn = !soundOn; savePrefs(); sfx.click(); return; }
      if (hit(buttons.pMusic, x, y)) { musicOn = !musicOn; savePrefs(); if (musicOn) startMusic(); else stopMusic(); sfx.click(); return; }
      if (hit(buttons.pRestart, x, y)) { paused = false; startGame(); return; }
      return;
    }
    if (STATE === "play" && hit(buttons.pause, x, y)) { pauseGame(); return; }
    if (STATE !== "play" && hit(buttons.sound, x, y)) { soundOn = !soundOn; savePrefs(); sfx.click(); return; }
    if (STATE === "start" && hit(buttons.orig, x, y)) { overlay = "museum"; sfx.click(); return; }
    if (STATE === "start" && hit(buttons.play, x, y)) { sfx.click(); startGame(); return; }
    if (STATE === "dead" && hit(buttons.wish, x, y)) { sfx.click(); openWishlist(); return; }
    if (STATE === "dead" && hit(buttons.again, x, y)) { sfx.click(); startGame(); return; }
  }

  function startGame() {
    layout();
    snake = newSnake();
    foods = [];
    npcs = [makeNpc("yellow"), makeNpc("blue")];
    fixerTimer = 22 + Math.random() * 8;
    floatMsg = null;
    paused = false;
    lastDeath = null;
    spawnFood(); spawnFood();
    STATE = "play";
    sfx.click();
    startMusic();          // старт по жесту пользователя (клик ИГРАТЬ / Enter)
  }

  function die(pond) {
    if (!snake.alive) return;
    snake.alive = false;
    STATE = "dead";
    stopMusic();           // на экране смерти музыку глушим
    if (pond) { sfx.bul(); } else { sfx.die(); }
    haptic("die");
  }

  // ---------------------------------------------------------------------------
  //  Обновление
  // ---------------------------------------------------------------------------
  // ближайшее свободное яблоко для мужика m
  function nearestFood(m) {
    var best = null, bd = 1e18, f, o;
    for (f = 0; f < foods.length; f++) {
      var taken = false;
      for (o = 0; o < npcs.length; o++) if (npcs[o] !== m && npcs[o].target === foods[f]) taken = true;
      if (taken) continue;
      var d = dist(m.x, m.y, foods[f].x, foods[f].y);
      if (d < bd) { bd = d; best = foods[f]; }
    }
    if (!best) for (f = 0; f < foods.length; f++) {
      var d2 = dist(m.x, m.y, foods[f].x, foods[f].y);
      if (d2 < bd) { bd = d2; best = foods[f]; }
    }
    return best;
  }
  // точка за ближайшим краем экрана (куда мужик уносит яблоко)
  function edgeTarget(m) {
    var dl = m.x, dr = W - m.x, dtp = m.y, db = H - m.y;
    var mn = Math.min(dl, dr, dtp, db);
    if (mn === dl) return { x: -90 * S, y: m.y };
    if (mn === dr) return { x: W + 90 * S, y: m.y };
    if (mn === dtp) return { x: m.x, y: -90 * S };
    return { x: m.x, y: H + 90 * S };
  }
  function moveToward(m, tx, ty, dt) {
    var a = Math.atan2(ty - m.y, tx - m.x);
    m.x += Math.cos(a) * m.spd * dt;
    m.y += Math.sin(a) * m.spd * dt;
  }
  function offscreen(m) { return m.x < -50 * S || m.x > W + 50 * S || m.y < -50 * S || m.y > H + 50 * S; }

  function update(dt) {
    if (paused) return;   // всё замирает на паузе
    // Таймер «фиксера»: изредка один мужик идёт чинить змейку
    if (STATE === "play") {
      fixerTimer -= dt;
      if (fixerTimer <= 0) {
        var pool = [];
        for (var q = 0; q < npcs.length; q++) if (npcs[q].mode !== "fixer" && npcs[q].mode !== "fixing") pool.push(npcs[q]);
        if (pool.length) {
          var pk = pool[(Math.random() * pool.length) | 0];
          if (pk.carry) { pk.carry.x = pk.x; pk.carry.y = pk.y; foods.push(pk.carry); pk.carry = null; }
          pk.mode = "fixer"; pk.target = null;
        }
        fixerTimer = 22 + Math.random() * 8;
      }
    }

    // NPC: воры-мужики (медленные) + пузыри-реплики
    for (var i = 0; i < npcs.length; i++) {
      var m = npcs[i];
      if (m.touchCd > 0) m.touchCd -= dt;

      if (STATE === "play") {
        if (m.mode === "fixer") {
          moveToward(m, snake.x, snake.y, dt);
          if (dist(m.x, m.y, snake.x, snake.y) < npcR() + headR()) {
            m.mode = "fixing"; m.fixAnim = 0.85; m.target = null;   // запускаем сценку «фикса»
            sfx.bul();
          }
        } else if (m.mode === "fixing") {
          // ~0.85с: мужик прилипает к голове змейки и суетится (машет руками, стук-стук)
          m.fixAnim -= dt;
          var sd = (m.x <= snake.x) ? -1 : 1;
          m.x = snake.x + sd * npcR() * 0.85;    // держится вплотную сбоку от головы
          m.y = snake.y - 6 * S;
          if (m.fixAnim <= 0) {
            floatMsg = { text: "ПОФИКШЕНО", t: 1.7 };
            snake.fixT = 5;
            snake.fixSeg = 3 + ((Math.random() * Math.max(1, snake.seg - 3)) | 0);
            m.mode = "seek"; m.target = null; m.touchCd = 1.2;
            sfx.click();
          }
        } else if (m.mode === "carry") {
          if (!m.edge) m.edge = edgeTarget(m);
          moveToward(m, m.edge.x, m.edge.y, dt);
          if (offscreen(m)) {                       // яблоко украдено
            m.carry = null; m.mode = "seek"; m.target = null; m.edge = null;
            m.x = Math.max(60 * S, Math.min(W - 60 * S, m.x));
            m.y = Math.max(60 * S, Math.min(H - 60 * S, m.y));
            if (Math.random() < 0.5) m.bubble = { text: "это ассет для другого проекта", t: 3.0 };
          }
        } else {                                    // seek
          var tf = nearestFood(m);
          m.target = tf;
          if (tf) {
            moveToward(m, tf.x, tf.y, dt);
            if (dist(m.x, m.y, tf.x, tf.y) < npcR() * 0.7) {
              for (var rf = 0; rf < foods.length; rf++) if (foods[rf] === tf) { foods.splice(rf, 1); break; }
              m.carry = tf; m.mode = "carry"; m.edge = edgeTarget(m); m.target = null;
              if (Math.random() < 0.4) m.bubble = { text: "это ассет для другого проекта", t: 3.0 };
            }
          }
        }
        // змейка коснулась вора, несущего яблоко: тот роняет добычу
        if (m.carry && m.touchCd <= 0 && dist(m.x, m.y, snake.x, snake.y) < npcR() + headR()) {
          m.carry.x = m.x; m.carry.y = m.y + 20 * S; foods.push(m.carry);
          m.carry = null; m.mode = "seek"; m.target = null; m.edge = null; m.touchCd = 1.2;
          m.bubble = { text: "ну и пожалуйста", t: 2.6 };
        }
        // контекстные реплики по близости змейки (приоритет над случайными, с кулдауном)
        if (m.ctxCd > 0) m.ctxCd -= dt;
        if (m.ctxCd <= 0 && dist(m.x, m.y, snake.x, snake.y) < 190 * S) {
          var cl;
          if (m.mode === "fixer" || m.mode === "fixing") {
            cl = "моя прелесть, дай тебя догоню, змеючело";
          } else {
            var nearApple = !!m.carry;
            for (var af = 0; af < foods.length && !nearApple; af++) if (dist(m.x, m.y, foods[af].x, foods[af].y) < 95 * S) nearApple = true;
            cl = nearApple ? "это моё яблоко!" : "ой, кто это ползёт у нас";
          }
          m.bubble = { text: cl, t: 2.4 };     // перекрывает случайный пузырь
          m.bubbleT = 6 + Math.random() * 6;
          m.ctxCd = 4.5;
        }
      }

      // дымки-пыхтелки: пока несёт — подкидываем новые; обновляем всегда (дотаивают)
      if (m.mode === "carry") {
        m.puffT -= dt;
        if (m.puffT <= 0) { m.puffs.push({ x: m.x + (Math.random() - 0.5) * 24 * S, y: m.y - 30 * S, t: 0, life: 0.7 + Math.random() * 0.4 }); m.puffT = 0.3; }
      }
      for (var pp = m.puffs.length - 1; pp >= 0; pp--) { var P = m.puffs[pp]; P.t += dt; P.y -= 22 * S * dt; if (P.t >= P.life) m.puffs.splice(pp, 1); }

      m.bubbleT -= dt;
      if (m.bubble) { m.bubble.t -= dt; if (m.bubble.t <= 0) m.bubble = null; }
      if (m.bubbleT <= 0 && !m.bubble && m.mode !== "carry") {
        m.bubble = { text: NPC_LINES[(Math.random() * NPC_LINES.length) | 0], t: 3.2 };
        m.bubbleT = 6 + Math.random() * 6;
      }
    }

    if (floatMsg) { floatMsg.t -= dt; if (floatMsg.t <= 0) floatMsg = null; }

    if (STATE !== "play") return;

    // держим на поле хотя бы 2 яблока (воры их растаскивают)
    var guard = 0;
    while (foods.length < 2 && guard++ < 4) spawnFood();

    // поворот к целевому курсу с ограничением скорости поворота
    snake.heading = angLerp(snake.heading, snake.target, TURN * dt);
    if (snake.invul > 0) snake.invul -= dt;
    if (snake.fixT > 0) snake.fixT -= dt;

    var sp = speed();
    snake.x += Math.cos(snake.heading) * sp * dt;
    snake.y += Math.sin(snake.heading) * sp * dt;

    // телепорт через края
    if (snake.x < 0) snake.x += W; else if (snake.x > W) snake.x -= W;
    // верх: над прудом стоит заборчик — мягко отражаем/скользим, не пускаем за край
    var fY = headR() * 0.5;
    if (snake.y < fY && snake.x > fence.x0 && snake.x < fence.x1) {
      snake.y = fY;
      if (Math.sin(snake.heading) < 0) snake.heading = -snake.heading; // довернуть вниз, скользя вдоль
    } else if (snake.y < 0) { snake.y += H; }
    else if (snake.y > H) { snake.y -= H; }

    snake.trail.push({ x: snake.x, y: snake.y });
    var maxTrail = Math.ceil((snake.seg + 4) * spacing() / Math.max(2, sp * dt)) + 30;
    if (snake.trail.length > maxTrail) snake.trail.splice(0, snake.trail.length - maxTrail);

    // еда
    var hr = headR();
    for (var f = foods.length - 1; f >= 0; f--) {
      var fd = foods[f];
      fd.wob += dt * 3;
      if (dist(snake.x, snake.y, fd.x, fd.y) < hr + fd.r + 4 * S) {
        foods.splice(f, 1);
        snake.seg += 1; snake.score += 1;
        sfx.eat(); haptic("eat");
        // мужик иногда комментирует со стороны, что змейка поела
        if (npcs.length && Math.random() < 0.4) {
          var cm = npcs[(Math.random() * npcs.length) | 0];
          if (cm.mode !== "carry") { cm.bubble = { text: "балдёж", t: 1.8 }; cm.bubbleT = 6 + Math.random() * 6; }
        }
        spawnFood();
      }
    }

    // столкновения (прощающие хитбоксы)
    if (snake.invul <= 0) {
      if (dist(snake.x, snake.y, tree.cx, tree.cy) < tree.r * 0.72 + hr * 0.4) { lastDeath = "tree"; die(false); return; }
      if (inEllipse(snake.x, snake.y, pond.cx, pond.cy, pond.rx * 0.9, pond.ry * 0.9)) { lastDeath = "pond"; die(true); return; }
      // смерть от своего хвоста — грейс-зона: первые ~4 сегмента у головы не считаются
      var body = sampleBody(snake.seg, spacing());
      for (var b = 4; b < body.length; b++) {
        if (dist(snake.x, snake.y, body[b].x, body[b].y) < bodyR() * 0.55) { lastDeath = "tail"; die(false); return; }
      }
    }
  }

  // ---------------------------------------------------------------------------
  //  Отрисовка мира
  // ---------------------------------------------------------------------------
  function drawTree() {
    // ствол
    rect(tree.x - tree.trunkW / 2, tree.baseY - tree.trunkH, tree.trunkW, tree.trunkH, "#8A5A2B");
    // 3 налезающих зелёных треугольника снизу вверх
    var levels = 3;
    for (var i = 0; i < levels; i++) {
      var f = i / (levels - 1);
      var cw = tree.w * (1 - f * 0.45);
      var by = tree.baseY - tree.trunkH - i * (tree.h * 0.30);
      var ty = by - tree.h * 0.45;
      tri(tree.x - cw / 2, by, tree.x + cw / 2, by, tree.x, ty, "#3EA24B");
      // небрежные чёрные штрихи, торчащие за края
      stroke(tree.x - cw / 2, by, tree.x - cw / 2 - 12 * S, by + 6 * S);
      stroke(tree.x + cw / 2, by, tree.x + cw / 2 + 14 * S, by - 4 * S);
      stroke(tree.x, ty, tree.x + 5 * S, ty - 13 * S);
    }
  }
  function drawPond() {
    ell(pond.cx, pond.cy, pond.rx, pond.ry, "#1E3A8A");
  }

  // Звёздочка из чёрточек (для сценки «фикса»), без глифов
  function starMark(x, y, r) {
    stroke(x - r, y, x + r, y);
    stroke(x, y - r, x, y + r);
    stroke(x - r * 0.7, y - r * 0.7, x + r * 0.7, y + r * 0.7);
    stroke(x - r * 0.7, y + r * 0.7, x + r * 0.7, y - r * 0.7);
  }

  function drawNpc(m) {
    // тела/цвета
    var headFill = m.kind === "yellow" ? "#F4D63A" : "#4B7BEC";
    var bellyFill = m.kind === "yellow" ? "#8A7A2B" : "#3A63C8";
    if (m.carry) bellyFill = "#C0512B";                       // пузо краснеет от натуги
    var limbFill = headFill;
    var hr = 26 * S, bw = 70 * S, bh = 60 * S;
    var bob = m.carry ? Math.sin(animT * 9 + m.y) * 3 * S : 0; // «спешит» — покачивание
    var mx = m.x + bob;
    // дымки-пыхтелки над несущим (серые тающие эллипсы) — видно издалека
    for (var pu = 0; pu < m.puffs.length; pu++) {
      var pf = m.puffs[pu];
      ctx.globalAlpha = Math.max(0, 1 - pf.t / pf.life) * 0.7;
      ell(pf.x, pf.y, (5 + pf.t * 10) * S, (4 + pf.t * 8) * S, "#BFC3C7");
      ctx.globalAlpha = 1;
    }
    // руки; при «фиксе» — машут вверх-вниз
    var wave = (m.mode === "fixing") ? Math.sin(animT * 20) * 12 * S : 0;
    rect(mx - bw * 0.7, m.y + hr * 0.4 - wave, bw * 0.5, 16 * S, limbFill);
    rect(mx + bw * 0.2, m.y + hr * 0.4 + wave, bw * 0.5, 16 * S, limbFill);
    // ноги
    rect(mx - 22 * S, m.y + hr + bh * 0.4, 18 * S, 44 * S, limbFill);
    rect(mx + 4 * S, m.y + hr + bh * 0.4, 18 * S, 44 * S, limbFill);
    // пузо-эллипс
    ell(mx, m.y + hr * 0.9, bw * 0.5, bh * 0.5, bellyFill);
    // голова
    ell(mx, m.y - hr * 0.2, hr, hr, headFill);
    // лицо (смотрит на нас)
    ell(mx - hr * 0.42, m.y - hr * 0.3, hr * 0.30, hr * 0.40, "#fff");
    ell(mx + hr * 0.42, m.y - hr * 0.3, hr * 0.30, hr * 0.40, "#fff");
    ell(mx, m.y + hr * 0.15, hr * 0.34, hr * 0.20, "#E33");
    // унесённое яблоко «в руке» (у правой ладони)
    if (m.carry) {
      var ax = mx + bw * 0.72, ay = m.y + hr * 0.4 + 8 * S;
      ell(ax, ay, 13 * S, 13 * S * 0.62, "#E33");
    }
    // сценка «фикса»: вокруг головы змейки — кольцо стук-стук штрихов и звёздочки
    if (m.mode === "fixing" && snake) {
      var shr = headR(), seed = Math.floor(animT * 16), n = 7;
      for (var kk = 0; kk < n; kk++) {
        var aa = kk * (Math.PI * 2 / n) + seed * 0.5;
        var r0 = shr * 1.15, r1 = shr * 1.15 + (9 + (kk % 2) * 8) * S;
        stroke(snake.x + Math.cos(aa) * r0, snake.y + Math.sin(aa) * r0,
               snake.x + Math.cos(aa) * r1, snake.y + Math.sin(aa) * r1);
      }
      starMark(snake.x - shr * 1.6, snake.y - shr * 1.5, 11 * S);
      starMark(snake.x + shr * 1.6, snake.y - shr * 1.2, 9 * S);
      starMark(snake.x, snake.y - shr * 2.0, 8 * S);
    }
    // пузырь реплики
    if (m.bubble) drawBubble(mx, m.y - hr - 12 * S, m.bubble.text);
  }

  function drawBubble(px, py, text) {
    ctx.font = Math.round(15 * S) + "px sans-serif";
    var padX = 12 * S, padY = 8 * S;
    var tw = ctx.measureText(text).width;
    var bw = tw + padX * 2, bh = 22 * S + padY;
    var bx = px - bw / 2, by = py - bh - 10 * S;
    if (bx < 6) bx = 6; if (bx + bw > W - 6) bx = W - 6 - bw;
    rect(bx, by, bw, bh, "#fff");
    // хвостик
    ctx.beginPath();
    ctx.moveTo(px - 8 * S, by + bh);
    ctx.lineTo(px + 6 * S, by + bh);
    ctx.lineTo(px, by + bh + 12 * S);
    ctx.closePath();
    ctx.fillStyle = "#fff"; ctx.fill(); ink(); ctx.stroke();
    // перекрыть основание хвостика (чтобы линия низа не пересекала) — по-пейнтовски не обязательно
    ctx.fillStyle = "#000";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(text, bx + bw / 2, by + bh / 2);
  }

  function drawFood(fd) {
    var w = Math.sin(fd.wob) * 1.5 * S;
    ell(fd.x, fd.y, fd.r + w, fd.r * 0.62 - w, "#E33");   // красный овал-«рот»
  }

  // Кривая табличка на палке (Paint-стиль). py — точка у земли; лёгкое покачивание.
  // Возвращает габарит доски {x,y,w,h} — для кликабельных зон.
  function drawSign(px, py, text, phase, withCross, textFill) {
    var sway = Math.sin(animT * 1.5 + (phase || 0)) * 0.05;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(sway);
    var postH = 46 * S;
    rect(-5 * S, -postH, 10 * S, postH, "#8A5A2B");         // столбик
    ctx.font = "bold " + Math.round(15 * S) + "px sans-serif";
    var tw = ctx.measureText(text).width;
    var extra = withCross ? 22 * S : 0;
    var bw = tw + 20 * S + extra, bh = 30 * S;
    var by = -postH - bh + 8 * S;
    rect(-bw / 2, by, bw, bh, "#fff");                      // белая доска
    if (withCross) {                                        // маленький кривой крестик
      var cxx = -bw / 2 + 13 * S, cyy = by + bh / 2;
      stroke(cxx - 6 * S, cyy - 7 * S, cxx + 6 * S, cyy + 7 * S);
      stroke(cxx + 6 * S, cyy - 7 * S, cxx - 6 * S, cyy + 7 * S);
    }
    crookedText(text, extra / 2, by + bh / 2, 15 * S, textFill || "#E33");
    ctx.restore();
    // габарит доски в экранных координатах (без учёта малого наклона)
    return { x: px - bw / 2, y: py + by, w: bw, h: bh };
  }

  function drawSnake() {
    var body = sampleBody(snake.seg, spacing());
    var fixOn = snake.fixT > 0;
    // тело: от хвоста к голове, зелёные налезающие эллипсы
    for (var i = body.length - 1; i >= 0; i--) {
      var col = (fixOn && i === snake.fixSeg) ? "#C84BE8" : "#5FE89C"; // один сегмент — «не тем цветом»
      ell(body[i].x, body[i].y, bodyR(), bodyR() * 0.92, col);
    }
    // голова
    var hr = headR();
    ctx.save();
    ctx.translate(snake.x, snake.y);
    ctx.rotate(snake.heading);
    ell(0, 0, hr, hr, "#5FE89C");
    face(hr, 1, true);
    if (fixOn) ell(hr * 0.05, -hr * 0.6, hr * 0.28, hr * 0.36, "#fff"); // третий глаз
    ctx.restore();
    // змейка всегда молчит — реплики только у мужиков
  }

  function drawHud() {
    ctx.font = "bold " + Math.round(26 * S) + "px sans-serif";
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.fillStyle = "#000";
    ctx.fillText("очки: " + snake.score, 14, 12);
    if (floatMsg) crookedText(floatMsg.text, W / 2, H * 0.5, 52 * S, "#E33");
    drawPauseButton();
  }

  function drawPauseButton() {
    var w = Math.max(112, 100 * S), h = Math.max(46, 40 * S);   // тач-мишень >= 44px
    var b = { x: W - w - 12, y: 12, w: w, h: h };
    buttons.pause = b;
    rect(b.x, b.y, b.w, b.h, "#fff");
    ctx.font = "bold " + Math.round(Math.max(15, 15 * S)) + "px sans-serif";
    ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("пауза", b.x + b.w / 2, b.y + b.h / 2);
  }

  function drawPause() {
    ctx.fillStyle = "rgba(251,247,135,0.85)";
    ctx.fillRect(0, 0, W, H);
    crookedText("ПАУЗА", W / 2, H * 0.22, 56 * S, "#5FE89C");
    drawButton("ДАЛЬШЕ", W / 2, H * 0.40, 260 * S, 56 * S, "pResume");
    drawButton(soundOn ? "звук: вкл" : "звук: выкл", W / 2, H * 0.52, 260 * S, 50 * S, "pSound", "#fff");
    drawButton(musicOn ? "музыка: вкл" : "музыка: выкл", W / 2, H * 0.62, 260 * S, 50 * S, "pMusic", "#fff");
    drawButton("ЗАНОВО", W / 2, H * 0.74, 260 * S, 56 * S, "pRestart", "#E9A0A0");
  }

  function drawSoundButton() {
    var w = Math.max(120, 108 * S), h = Math.max(46, 40 * S);   // тач-мишень >= 44px
    var b = { x: W - w - 12, y: 12, w: w, h: h };
    buttons.sound = b;
    rect(b.x, b.y, b.w, b.h, "#fff");
    ctx.font = Math.round(Math.max(15, 15 * S)) + "px sans-serif";
    ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(soundOn ? "звук: вкл" : "звук: выкл", b.x + b.w / 2, b.y + b.h / 2);
  }

  // Кривые «рисованные» буквы для крупных заголовков
  function crookedText(text, cx, cy, size, fill) {
    ctx.font = "bold " + Math.round(size) + "px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    var widths = [], total = 0;
    for (var i = 0; i < text.length; i++) { var wch = ctx.measureText(text[i]).width + size * 0.04; widths.push(wch); total += wch; }
    var x = cx - total / 2;
    for (var j = 0; j < text.length; j++) {
      var w = widths[j];
      var seed = (j * 928371) % 1000 / 1000;
      var rot = (seed - 0.5) * 0.28;
      var dy = (((j * 13) % 7) - 3) * size * 0.03;
      ctx.save();
      ctx.translate(x + w / 2, cy + dy);
      ctx.rotate(rot);
      ctx.lineWidth = Math.max(1, 1.4 * S); ctx.strokeStyle = "#000";
      ctx.fillStyle = fill;
      ctx.fillText(text[j], 0, 0);
      ctx.strokeText(text[j], 0, 0);
      ctx.restore();
      x += w;
    }
  }

  function drawButton(label, cx, cy, w, h, key, fill) {
    var b = { x: cx - w / 2, y: cy - h / 2, w: w, h: h };
    buttons[key] = b;
    rect(b.x, b.y, b.w, b.h, fill || "#5FE89C");
    ctx.font = "bold " + Math.round(24 * S) + "px sans-serif";
    ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(label, cx, cy + 1);
  }

  // ---------------------------------------------------------------------------
  //  Экраны
  // ---------------------------------------------------------------------------
  function drawWorld() {
    drawPond();
    drawTree();
    for (var f = 0; f < foods.length; f++) drawFood(foods[f]);
    for (var i = 0; i < npcs.length; i++) drawNpc(npcs[i]);
  }

  // Предупреждающие таблички + заборчик — только в геймплее (не на старте/смерти,
  // чтобы не наезжать на подсказки и сценку Рыжика).
  function drawFieldSigns() {
    drawSign(pond.cx - pond.rx * 0.5, pond.cy - pond.ry, "утонешь!", 1.3, true);
    drawSign(tree.x + tree.w * 0.42 + 24 * S, tree.baseY, "опасно!", 0.0, true);
  }
  function drawFence() {
    if (fence.x1 - fence.x0 < 4) return;
    var pw = 8 * S, gap = 15 * S, h = fence.h;
    rect(fence.x0, 9 * S, fence.x1 - fence.x0, 7 * S, "#8A5A2B");   // перекладина
    for (var x = fence.x0 + 3 * S; x < fence.x1 - pw; x += (pw + gap)) {
      var jit = (((x | 0) % 5) - 2) * S;                            // лёгкая кривизна
      rect(x, 0, pw, h + jit, "#A56A33");                          // штакетина
    }
  }

  function drawStart() {
    // немного мира на фоне для настроения
    drawWorld();
    crookedText("ЗМЕЮЧЕЛО", W / 2, H * 0.30, 64 * S, "#5FE89C");
    // декоративная голова змеючела
    ctx.save();
    ctx.translate(W / 2, H * 0.47);
    var hr = 46 * S;
    ell(0, 0, hr, hr, "#5FE89C");
    face(hr, 1, true);
    ctx.restore();
    drawButton("ИГРАТЬ", W / 2, H * 0.64, 220 * S, 64 * S, "play");
    ctx.font = Math.round(16 * S) + "px sans-serif";
    ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("вдохновлено одним известным скриншотом", W / 2, H * 0.735);
    ctx.fillText("стрелки / WASD / свайп", W / 2, H * 0.775);
    ctx.fillText("ёлка и пруд — смерть. мужики — нет.", W / 2, H * 0.815);
    drawButton("ОРИГИНАЛ", W / 2, H * 0.89, 190 * S, 48 * S, "orig", "#fff");
    drawSoundButton();
  }

  // Вовка — готовый мем-кадр («И ТАК СОЙДЁТ!» вшито в картинку), как полароид-экспонат
  function drawVovka(cx, cy) {
    if (!(vovkaReady && vovkaImg.naturalWidth)) return;
    var tw = 150 * S, th = tw * (vovkaImg.naturalHeight / vovkaImg.naturalWidth);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(-0.05);                                       // пара градусов для живости
    rect(-tw / 2 - 6 * S, -th / 2 - 6 * S, tw + 12 * S, th + 24 * S, "#fff"); // белая рамка-полароид
    ctx.drawImage(vovkaImg, -tw / 2, -th / 2, tw, th);
    ctx.strokeStyle = "#000"; ctx.lineWidth = Math.max(1, 1.1 * S);
    ctx.strokeRect(-tw / 2, -th / 2, tw, th);
    ctx.restore();
  }

  // Рыжик — пёс из рыжих эллипсов; держит кривую табличку «вишлистни Dog Brew».
  // Вся зона (пёс + табличка) кликабельна → Steam.
  function drawRyzhik(cx, cy) {
    var u = S, by = cy - 6 * u;
    ell(cx, by, 46 * u, 28 * u, "#E8842B");                            // туловище
    rect(cx - 30 * u, by + 18 * u, 12 * u, 26 * u, "#E8842B");         // лапа
    rect(cx - 8 * u, by + 20 * u, 12 * u, 26 * u, "#E8842B");          // лапа
    rect(cx + 16 * u, by + 18 * u, 12 * u, 26 * u, "#E8842B");         // лапа
    ell(cx + 50 * u, by - 12 * u, 16 * u, 7 * u, "#E8842B");           // хвост
    var hx = cx - 44 * u, hy = by - 18 * u, hr = 23 * u;
    ell(hx, hy, hr, hr, "#F09A3E");                                    // голова
    tri(hx - hr * 0.85, hy - hr * 0.35, hx - hr * 0.15, hy - hr * 0.6, hx - hr * 0.95, hy - hr * 1.25, "#D9761F"); // ухо
    tri(hx + hr * 0.15, hy - hr * 0.6, hx + hr * 0.85, hy - hr * 0.35, hx + hr * 0.95, hy - hr * 1.2, "#D9761F");  // ухо
    ell(hx - hr * 0.5, hy + hr * 0.32, hr * 0.5, hr * 0.4, "#F5B36A"); // морда
    ell(hx - hr * 0.15, hy - hr * 0.12, hr * 0.16, hr * 0.22, "#fff");
    ell(hx - hr * 0.72, hy - hr * 0.12, hr * 0.16, hr * 0.22, "#fff");
    ell(hx - hr * 0.78, hy + hr * 0.28, hr * 0.18, hr * 0.12, "#000"); // нос
    // картонка-реклама В ЛАПАХ снизу (не поверх морды): пёс сам зовёт вишлистить
    var txt = "вишлистни Dog Brew";
    ctx.font = "bold " + Math.round(14 * S) + "px sans-serif";
    var tw = ctx.measureText(txt).width, bw = tw + 18 * S, bh = 28 * S;
    var pcy = by + 52 * u;                                             // центр картонки
    stroke(cx - 4 * u, by + 40 * u, cx - 2 * u, pcy - bh * 0.5);       // палочка от лапы
    ctx.save();
    ctx.translate(cx, pcy);
    ctx.rotate(0.04);
    rect(-bw / 2, -bh / 2, bw, bh, "#fff");
    crookedText(txt, 0, 0, 14 * S, "#1447D6");
    ctx.restore();
    drawBubble(cx, hy - hr - 8 * u, "Я Рыжик, 40 лет. Так и не добавили.");
    // кликабельная зона: пёс + картонка
    var zx = cx - bw / 2 - 4 * S, zR = cx + bw / 2 + 4 * S;
    var zTop = hy - hr, zBot = pcy + bh / 2;
    buttons.wish = { x: zx, y: zTop, w: zR - zx, h: zBot - zTop };
  }

  function drawDead() {
    drawWorld();
    if (snake) drawSnake();
    // затемняющая плашка — сильнее приглушаем поле (декорации не отвлекают от сценки)
    ctx.fillStyle = "rgba(251,247,135,0.93)";
    ctx.fillRect(0, 0, W, H);
    crookedText("ЗМЕЮЧЕЛО", W / 2, H * 0.10, 46 * S, "#5FE89C");
    crookedText("ВСЁ", W / 2, H * 0.175, 56 * S, "#E33");
    ctx.font = "bold " + Math.round(26 * S) + "px sans-serif";
    ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("очки: " + (snake ? snake.score : 0), W / 2, H * 0.245);
    ctx.font = Math.round(15 * S) + "px sans-serif";
    ctx.fillText("Эта игра сгенерирована одним запросом.", W / 2, H * 0.30);
    ctx.fillText("Ладно, двумя. (ну ладно, 5-6, кто считает)", W / 2, H * 0.33);
    drawButton("ЕЩЁ РАЗ", W / 2, H * 0.42, 240 * S, 56 * S, "again");
    drawVovka(W * 0.26, H * 0.71);
    drawRyzhik(W * 0.71, H * 0.66);
    drawSoundButton();
  }

  // Оверлей-«музей»: первоисточник в рамке
  function drawMuseum() {
    ctx.fillStyle = "rgba(0,0,0,0.80)";
    ctx.fillRect(0, 0, W, H);
    crookedText("ОРИГИНАЛ", W / 2, H * 0.10, 40 * S, "#FBF787");
    var cy = H * 0.46;
    if (origReady && origImg.naturalWidth) {
      var maxW = W * 0.82, maxH = H * 0.52;
      var sc = Math.min(maxW / origImg.naturalWidth, maxH / origImg.naturalHeight);
      var dw = origImg.naturalWidth * sc, dh = origImg.naturalHeight * sc;
      var dx = W / 2 - dw / 2, dy = cy - dh / 2;
      rect(dx - 9 * S, dy - 9 * S, dw + 18 * S, dh + 18 * S, "#fff");   // рамка
      ctx.drawImage(origImg, dx, dy, dw, dh);
      ctx.strokeStyle = "#000"; ctx.lineWidth = Math.max(1, 1.1 * S);
      ctx.strokeRect(dx, dy, dw, dh);
      // музейная табличка
      ctx.font = Math.round(14 * S) + "px sans-serif";
      var t1 = "ОРИГИНАЛ. Выложен Юликом", lt = "t.me/jul_gd";
      var pw = Math.max(ctx.measureText(t1).width, ctx.measureText(lt).width) + 26 * S;
      var py = dy + dh + 20 * S;
      rect(W / 2 - pw / 2, py, pw, 42 * S, "#fff");
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#000";
      ctx.fillText(t1, W / 2, py + 15 * S);
      // кликабельная ссылка на Юлика
      var ly = py + 31 * S, lw = ctx.measureText(lt).width;
      ctx.fillStyle = "#1447D6";
      ctx.fillText(lt, W / 2, ly);
      ctx.strokeStyle = "#1447D6"; ctx.lineWidth = Math.max(1, 1.2 * S);
      ctx.beginPath(); ctx.moveTo(W / 2 - lw / 2, ly + 8 * S); ctx.lineTo(W / 2 + lw / 2, ly + 8 * S); ctx.stroke();
      buttons.julLink = { x: W / 2 - lw / 2 - 8 * S, y: ly - 10 * S, w: lw + 16 * S, h: 24 * S };
    } else {
      ctx.font = Math.round(16 * S) + "px sans-serif";
      ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("загрузка...", W / 2, cy);
    }
    drawButton("ЗАКРЫТЬ", W / 2, H * 0.92, 180 * S, 50 * S, "museumClose", "#5FE89C");
  }

  function openWishlist() {
    var url = "https://store.steampowered.com/app/2883280/Dog_Brew/";
    try { if (Tg && typeof Tg.openLink === "function") { Tg.openLink(url); return; } } catch (e) {}
    window.open(url, "_blank", "noopener");
  }
  function openTelegram() {
    // t.me-ссылки в Telegram открываются именно openTelegramLink
    var url = "https://t.me/jul_gd";
    try { if (Tg && typeof Tg.openTelegramLink === "function") { Tg.openTelegramLink(url); return; } } catch (e) {}
    window.open(url, "_blank", "noopener");
  }

  // ---------------------------------------------------------------------------
  //  Главный цикл
  // ---------------------------------------------------------------------------
  var last = performance.now();
  function frame(now) {
    var dt = (now - last) / 1000;
    if (dt > 0.05) dt = 0.05;   // клип на лаги
    last = now;
    animT += dt;

    update(dt);

    ctx.clearRect(0, 0, W, H);
    // фон
    ctx.fillStyle = "#FBF787";
    ctx.fillRect(0, 0, W, H);

    if (STATE === "start") drawStart();
    else if (STATE === "play") { drawWorld(); drawFieldSigns(); drawSnake(); drawFence(); drawHud(); if (paused) drawPause(); }
    else if (STATE === "dead") drawDead();

    if (overlay === "museum") drawMuseum();

    requestAnimationFrame(frame);
  }

  // ---------------------------------------------------------------------------
  //  Telegram Mini App — graceful fallback
  // ---------------------------------------------------------------------------
  try {
    if (window.Telegram && window.Telegram.WebApp) {
      Tg = window.Telegram.WebApp;
      Tg.ready();
      Tg.expand();
      // Bot API 7.7+: не давать вертикальному свайпу сворачивать мини-апп
      // (иначе свайп-вниз в управлении закрывал бы приложение)
      try { if (typeof Tg.disableVerticalSwipes === "function") Tg.disableVerticalSwipes(); } catch (e2) {}
      // учёт вьюпорта Telegram
      Tg.onEvent && Tg.onEvent("viewportChanged", function () { resize(); });
    }
  } catch (e) { Tg = null; }

  // тач-управление не должно дёргать скролл/жесты страницы
  canvas.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive: false });

  // ---------------------------------------------------------------------------
  //  Старт
  // ---------------------------------------------------------------------------

  loadPrefs();
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function () { setTimeout(resize, 120); });
  resize();
  npcs = [makeNpc("yellow"), makeNpc("blue")];  // для фонового старт-экрана
  spawnFoodSafe();
  requestAnimationFrame(frame);

  function spawnFoodSafe() {
    snake = newSnake(); // временный, чтобы spawnFood имел координаты
    foods = [];
    spawnFood();
    snake = null;
  }
})();
</script>
</body>
</html>
